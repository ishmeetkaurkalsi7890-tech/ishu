<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord | GreenCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <style>
        :root { --bg-sidebar: #1e1f22; --bg-channels: #2b2d31; --bg-chat: #313338; --text-muted: #949ba4; }
        body { background-color: var(--bg-chat); color: #dbdee1; font-family: sans-serif; overflow: hidden; }
        .server-icon:hover { border-radius: 30% !important; background-color: #5865f2 !important; color: white !important; }
        #watch-area { display: none; background: #000; width: 100%; aspect-ratio: 16/9; border-bottom: 2px solid #1e1f22; }
        #emoji-picker-container { display: none; position: absolute; bottom: 80px; right: 20px; z-index: 100; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e1f22; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <div id="login-overlay" class="fixed inset-0 z-[999] flex items-center justify-center bg-[#1e1f22]">
        <div class="bg-[#313338] p-8 rounded-lg shadow-2xl w-[420px] text-center border border-black/20">
            <h1 class="text-2xl font-bold text-white mb-2">Welcome Back!</h1>
            <p class="text-[--text-muted] mb-6">Enter a nickname to join the room.</p>
            <input id="user-nick" type="text" placeholder="Nickname" class="w-full p-3 bg-[#1e1f22] rounded mb-4 outline-none text-white border border-transparent focus:border-[#5865f2] transition" onkeypress="if(event.key === 'Enter') login()">
            <button onclick="login()" class="w-full bg-[#5865f2] text-white py-3 rounded font-bold hover:bg-[#4752c4] transition shadow-lg">Login</button>
        </div>
    </div>

    <div class="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 gap-2 shrink-0">
        <div class="w-12 h-12 bg-[#313338] text-[#23a559] rounded-[50%] flex items-center justify-center cursor-pointer transition-all hover:rounded-[30%]"><i class="fab fa-discord text-2xl"></i></div>
        <div class="w-8 h-[2px] bg-[#35373c] rounded-full"></div>
        <div class="w-12 h-12 bg-[#5865f2] text-white rounded-[30%] flex items-center justify-center font-bold">GC</div>
    </div>

    <div class="w-60 bg-[#2b2d31] flex flex-col shrink-0">
        <div class="h-12 border-b border-black/20 flex items-center px-4 font-bold text-white shadow-sm">GreenCode</div>
        <div class="p-3 space-y-4">
            <div>
                <div class="text-[--text-muted] text-[11px] font-bold uppercase mb-2 px-2">Text Channels</div>
                <div class="bg-[#3f4147] text-white px-2 py-1.5 rounded flex items-center cursor-pointer text-sm font-medium">
                    <i class="fas fa-hashtag text-gray-500 mr-2"></i> general
                </div>
            </div>
            <div>
                <div class="text-[--text-muted] text-[11px] font-bold uppercase mb-2 px-2">Activities</div>
                <div onclick="toggleWatch()" class="hover:bg-[#35373c] text-white px-2 py-1.5 rounded flex items-center cursor-pointer text-sm transition">
                    <i class="fas fa-play-circle text-red-500 mr-2"></i> Watch Together
                </div>
            </div>
        </div>
    </div>

    <div class="flex-grow flex flex-col relative bg-[#313338]">
        <header class="h-12 border-b border-black/20 flex items-center px-4 font-bold bg-[#313338] shadow-sm"># general</header>
        
        <div id="watch-area">
            <div class="p-2 flex gap-2 bg-[#1e1f22]">
                <input id="yt-url" type="text" placeholder="YouTube URL..." class="flex-grow bg-black p-2 text-xs rounded border-none outline-none text-white">
                <button onclick="playVideo()" class="bg-red-600 px-4 py-1 text-xs rounded text-white font-bold hover:bg-red-500 transition">LAUNCH</button>
            </div>
            <div id="yt-frame" class="w-full h-full"></div>
        </div>

        <div id="chat-scroller" class="flex-grow overflow-y-auto p-4 space-y-1"></div>

        <div id="emoji-picker-container"><emoji-picker class="dark"></emoji-picker></div>

        <div class="px-4 pb-6">
            <div class="bg-[#383a40] rounded-lg flex items-center px-4 py-2.5 shadow-xl">
                <i class="fas fa-plus-circle text-gray-400 mr-3 text-xl hover:text-white cursor-pointer transition"></i>
                <input id="msg-input" type="text" placeholder="Message #general" class="bg-transparent flex-grow outline-none text-white font-light" onkeypress="if(event.key === 'Enter') send()">
                <div class="flex gap-4 text-gray-400">
                    <i class="fas fa-smile hover:text-white cursor-pointer transition" onclick="toggleEmoji()"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "PASTE_HERE",
            authDomain: "PASTE_HERE",
            databaseURL: "PASTE_HERE",
            projectId: "PASTE_HERE",
            storageBucket: "PASTE_HERE",
            messagingSenderId: "PASTE_HERE",
            appId: "PASTE_HERE"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const chatRef = db.ref("messages");

        let myName = "";

        function login() {
            myName = document.getElementById('user-nick').value;
            if(!myName) return;
            document.getElementById('login-overlay').style.display = 'none';

            // Start listening for messages from the Cloud Database
            chatRef.on("child_added", (snapshot) => {
                const data = snapshot.val();
                renderMsg(data.user, data.text, data.time);
            });
        }

        function send() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;

            // Push message to Cloud (Firebase)
            chatRef.push({
                user: myName,
                text: input.value,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            });

            input.value = "";
        }

        function renderMsg(user, text, time) {
            const flow = document.getElementById('chat-scroller');
            const html = `
                <div class="flex items-start hover:bg-black/10 px-4 py-1 -mx-4 transition group">
                    <div class="w-10 h-10 bg-[#5865f2] rounded-full flex items-center justify-center font-bold text-white mr-4 mt-1 shrink-0">${user.charAt(0).toUpperCase()}</div>
                    <div>
                        <span class="font-bold text-white hover:underline cursor-pointer mr-2">${user}</span>
                        <span class="text-[10px] text-gray-500">${time}</span>
                        <p class="text-[15px] leading-snug">${text}</p>
                    </div>
                </div>`;
            flow.insertAdjacentHTML('beforeend', html);
            flow.scrollTop = flow.scrollHeight;
        }

        function toggleWatch() {
            const w = document.getElementById('watch-area');
            w.style.display = w.style.display === 'block' ? 'none' : 'block';
        }

        function playVideo() {
            const url = document.getElementById('yt-url').value;
            const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
            if(id) document.getElementById('yt-frame').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
        }

        function toggleEmoji() {
            const e = document.getElementById('emoji-picker-container');
            e.style.display = e.style.display === 'block' ? 'none' : 'block';
        }

        document.querySelector('emoji-picker').addEventListener('emoji-click', e => {
            document.getElementById('msg-input').value += e.detail.unicode;
        });
    </script>
</body>
</html>
