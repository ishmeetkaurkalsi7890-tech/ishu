<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenCode | Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .chat-container { height: calc(100vh - 160px); }
        #yt-box { display: none; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; margin-bottom: 1.5rem; border: 2px solid #22c55e; }
        #emoji-container { display: none; position: absolute; bottom: 90px; right: 20px; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen p-4 md:p-6 gap-6">

    <div id="login-overlay" class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-950/95 backdrop-blur-xl">
        <div class="glass p-10 rounded-3xl w-full max-w-md text-center shadow-2xl border-green-500/20">
            <div class="w-20 h-20 bg-green-500 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-[0_0_30px_rgba(34,197,94,0.3)]">
                <i class="fas fa-bolt text-4xl text-slate-950"></i>
            </div>
            <h1 class="text-3xl font-800 text-white mb-2 tracking-tighter">GREENCODE</h1>
            <p class="text-slate-400 mb-8 text-sm font-medium">ENTER NICKNAME TO START FLOW</p>
            <input id="user-nick" type="text" placeholder="Your Name..." 
                class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-all text-white text-center font-bold" 
                onkeypress="if(event.key === 'Enter') startApp()">
            <p class="mt-6 text-[10px] text-slate-500 font-black tracking-widest animate-pulse">PRESS ENTER</p>
        </div>
    </div>

    <div class="hidden md:flex flex-col w-72 gap-4 shrink-0">
        <div class="glass p-6 rounded-[2rem] flex flex-col gap-3">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 px-2">Activities</h2>
            <button onclick="toggleYT()" class="w-full flex items-center justify-between p-4 rounded-2xl bg-green-500/10 text-green-400 font-bold hover:bg-green-500/20 transition group">
                <span class="flex items-center gap-3"><i class="fas fa-play-circle"></i> Watch Together</span>
                <i class="fas fa-chevron-right text-[10px] opacity-0 group-hover:opacity-100 transition"></i>
            </button>
        </div>
        
        <div class="glass p-6 rounded-[2rem] flex-grow flex flex-col">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 px-2">Channel Management</h2>
            <div class="flex-grow">
                <div class="p-3 rounded-2xl bg-white/5 border border-white/5 text-sm mb-2 flex items-center gap-3">
                    <i class="fas fa-hashtag text-slate-500"></i> general-flow
                </div>
            </div>
            <button onclick="wipeHistory()" class="w-full flex items-center gap-3 p-4 rounded-2xl hover:bg-red-500/10 text-red-500/80 text-xs font-black uppercase tracking-widest transition border border-transparent hover:border-red-500/20">
                <i class="fas fa-trash-alt"></i> Wipe History
            </button>
        </div>
    </div>

    <div class="flex-grow flex flex-col gap-4">
        <div class="glass flex-grow rounded-[2.5rem] p-6 flex flex-col relative overflow-hidden shadow-2xl">
            
            <div class="flex items-center justify-between mb-6 px-2">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="font-800 text-lg tracking-tight">general-flow</span>
                </div>
                <div class="flex gap-4 text-slate-500">
                    <i class="fas fa-search cursor-pointer hover:text-white transition"></i>
                    <i class="fas fa-ellipsis-v cursor-pointer hover:text-white transition"></i>
                </div>
            </div>

            <div id="yt-box" class="shadow-2xl">
                <div class="bg-slate-900 p-3 flex gap-3 border-b border-white/5">
                    <input id="yt-url" type="text" placeholder="Paste YouTube Link (e.g., https://youtu.be/...)" 
                        class="flex-grow bg-slate-950 text-xs p-3 rounded-xl outline-none border border-white/5 text-white focus:border-green-500">
                    <button onclick="launchYT()" class="bg-green-500 hover:bg-green-400 text-slate-950 px-6 py-2 rounded-xl font-800 text-xs transition">LAUNCH</button>
                </div>
                <div id="video-frame" class="w-full h-full bg-black flex items-center justify-center">
                    <i class="fab fa-youtube text-6xl text-white/10"></i>
                </div>
            </div>

            <div id="flow-container" class="chat-container overflow-y-auto space-y-6 pr-4">
                <div class="flex flex-col items-center py-20 text-center opacity-20">
                    <i class="fas fa-shield-alt text-5xl mb-4"></i>
                    <p class="text-xs font-black uppercase tracking-[0.4em]">End-to-End Encryption Active</p>
                </div>
            </div>

            <div id="emoji-container"><emoji-picker class="dark"></emoji-picker></div>

            <div class="mt-auto pt-4">
                <div class="bg-slate-900/80 backdrop-blur-md rounded-[1.5rem] p-2 flex items-center gap-2 border border-white/5 focus-within:border-green-500/50 transition-all shadow-xl">
                    <button class="w-10 h-10 flex items-center justify-center text-slate-500 hover:text-white transition"><i class="fas fa-plus"></i></button>
                    <input id="main-input" type="text" placeholder="Send a message..." 
                        class="bg-transparent flex-grow p-3 outline-none text-white font-medium" 
                        onkeypress="if(event.key === 'Enter') pushMsg()">
                    <button onclick="toggleEmoji()" class="w-10 h-10 flex items-center justify-center text-slate-500 hover:text-green-400 transition"><i class="fas fa-smile text-xl"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myNick = "";

        function startApp() {
            const input = document.getElementById('user-nick');
            if(!input.value.trim()) return;
            myNick = input.value.trim();
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('login-overlay').style.display = 'none', 300);
        }

        function pushMsg() {
            const input = document.getElementById('main-input');
            if(!input.value.trim()) return;
            
            const container = document.getElementById('flow-container');
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            const msgHtml = `
                <div class="flex flex-col items-start animate-in slide-in-from-bottom-2 duration-300">
                    <div class="flex items-center gap-2 mb-1 px-1">
                        <span class="text-[10px] font-black text-green-500 uppercase tracking-widest">${myNick}</span>
                        <span class="text-[9px] text-slate-600 font-bold">${time}</span>
                    </div>
                    <div class="bg-slate-800/40 backdrop-blur-sm p-4 rounded-3xl rounded-tl-none border border-white/5 max-w-[85%] shadow-sm">
                        <p class="text-[15px] leading-relaxed text-slate-200">${input.value}</p>
                    </div>
                </div>`;
            
            container.insertAdjacentHTML('beforeend', msgHtml);
            input.value = "";
            container.scrollTop = container.scrollHeight;
        }

        function toggleYT() {
            const box = document.getElementById('yt-box');
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        }

        function launchYT() {
            const url = document.getElementById('yt-url').value;
            let id = "";
            if(url.includes('v=')) id = url.split('v=')[1].split('&')[0];
            else id = url.split('/').pop();
            
            if(id) {
                document.getElementById('video-frame').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            }
        }

        function toggleEmoji() {
            const e = document.getElementById('emoji-container');
            e.style.display = (e.style.display === 'block') ? 'none' : 'block';
        }

        document.querySelector('emoji-picker').addEventListener('emoji-click', e => {
            document.getElementById('main-input').value += e.detail.unicode;
        });

        function wipeHistory() {
            if(confirm("Confirm: Clear channel history?")) {
                if(confirm("FINAL CHECK: This will wipe all messages for this session. Continue?")) {
                    document.getElementById('flow-container').innerHTML = `
                        <div class="flex flex-col items-center py-20 text-center opacity-40">
                            <i class="fas fa-eraser text-4xl mb-4 text-red-500"></i>
                            <p class="text-[10px] font-black uppercase tracking-[0.4em] text-red-500">History Wiped by ${myNick}</p>
                        </div>`;
                }
            }
        }
    </script>
</body>
</html>
